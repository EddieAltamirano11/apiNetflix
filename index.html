<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Netflix - Películas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="netflix-header">
        <h1 class="netflix-logo">PELÍCULAS</h1>
    </header>

    <main>

        <section class="panel-formulario">
            <h2>CRUD PELICULAS</h2>

            <form id="formulario">

                <input type="text" id="id" placeholder="ID">

                <input type="text" id="titulo" placeholder="Título" required disabled>
                <input type="text" id="genero" placeholder="Género" required disabled>
                <input type="number" id="año" placeholder="Año" required disabled>
                <input type="number" id="duracion" placeholder="Duración (min)" required disabled>
                <input type="text" id="idioma" placeholder="Idioma" required disabled>
                <input type="number" id="calificacion" placeholder="Calificación" min="0" max="10" step="0.1" required disabled>
                <input type="text" id="numCtrl" placeholder="Número de Control" required disabled>
                <input type="text" id="portada" placeholder="Link a Portada" required disabled>

                <select id="metodo">
                    <option value="sinSeleccion">Seleccionar método</option>
                    <option value="GET">Consultar Todas</option>
                    <option value="GETxID">Consultar por ID</option>
                    <option value="POST">Crear</option>
                </select>

                <button id="btnMetodo" type="submit" disabled>
                    Selecciona un Método
                </button>

            </form>
        </section>

        <section class="catalogo">
            <div id="listaPeliculas" class="grid-peliculas"></div>
        </section>

    </main>

    <script src="api.js"></script>
    <script src="app.js"></script>

</body>

</html>
