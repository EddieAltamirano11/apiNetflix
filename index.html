<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Consumir API REST</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            width: 600px;
            margin: 30px auto;
        }

        input {
            display: block;
            width: 100%;
            padding: 8px;
            margin: 10px 0;
        }

        button,select {
            padding: 10px 15px;
            margin: 10px 0;
            cursor: pointer;
        }

        ul {
            margin-top: 20px;
        }

        li {
            margin: 8px 0;
        }
        #id{
            display: none;
        }
    </style>
</head>

<body>

    <h1>Películas</h1>

    <h2>Registrar película</h2>

    <form id="formulario">

        <input
            type="text"
            id="id"
            placeholder="ID"
        >
        <input
            type="text"
            id="titulo"
            placeholder="Título"
            required
            disabled
        >

        <input
            type="text"
            id="genero"
            placeholder="Género"
            required
            disabled
        >

        <input
            type="number"
            id="año"
            placeholder="Año"
            required
            disabled
        >

        <input
            type="number"
            id="duracion"
            placeholder="Duración"
            required
            disabled
        >

        <input
            type="text"
            id="idioma"
            placeholder="Idioma"
            required
            disabled
        >

        <input
            type="number"
            id="calificacion"
            placeholder="Calificación"
            min="0"
            max="10"
            step="0.1"
            required
            disabled
        >

        <input
            type="text"
            id="numCtrl"
            placeholder="Número de Control"
            required
            disabled
        >

        <input
            type="text"
            id="portada"
            placeholder="Link a Portada"
            required
            disabled
        >

        <button id="btnMetodo" type="submit" disabled>
            Selecciona un Método
        </button>

    </form>

    <hr>
    <select id="metodo">
        <option value="sinSeleccion">Seleccionar método</option>
        <option value="GET">Consultar Todas</option>
        <option value="GETxID">Consultar por ID</option>
        <option value="POST">Crear</option>
        <option value="PUT">Actualizar</option>
        <option value="DELETE">Eliminar</option>
    </select>

    <ul id="listaPeliculas"></ul>

    <script src="api.js"></script>
    <script src="app.js"></script>

</body>

</html>
